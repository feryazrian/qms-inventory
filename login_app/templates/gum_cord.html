<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gum Cord</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/home.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/cg.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/gc.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/splash.css') }}">
    <script src="{{ url_for('static', filename='js/splash.js') }}" defer></script>
    <noscript><style>.page-splash{display:none !important;}</style></noscript>
</head>
<body class="is-splash-visible">
    <div class="page-splash" id="page-splash" aria-hidden="true">
        <div class="page-splash__panel">
            <div class="page-splash__brand">
                <img src="{{ url_for('static', filename='img/kartindo-loading-logo.png') }}" alt="Kartindo Logo">
            </div>
            <h1 class="page-splash__title">Gum Cord</h1>
            <p class="page-splash__text">Memuat lembar kerja produksi Gum Cord.</p>
            <div class="page-splash__bar"></div>
        </div>
    </div>
    <div class="header">
        <div class="header-inner">
            <a href="/home" aria-label="Ke halaman Home">
                <img
                    src="https://www.kartindorubber.com/assets/img/logo/logo2.png"
                    alt="Kartindo Rubber"
                    class="header-logo"
                >
            </a>
            <a href="/logout" class="logout-btn">Logout</a>
        </div>
    </div>

    <div class="container gum-cord-page">
        <div class="cg-info">
            <div>
                <label>Nama Operator</label>
                <input type="text" name="nama_operator" form="gum-cord-form">
            </div>
            <div>
                <label>No. Mesin</label>
                <input type="text" id="no-mesin" name="no_mesin" form="gum-cord-form">
            </div>
            <div>
                <label>Hari / Tanggal</label>
                <input type="date" id="tanggal_display">
            </div>
        </div>

        <div class="content-box">
            <div class="section-header gum-cord-header">
                <h3 class="section-title"><span class="section-prefix">C.</span> Hasil Produksi Gum Cord</h3>
                <div class="section-actions">
                    <button type="button" class="add-row-btn" onclick="confirmResetGc()">Reset Form</button>
                    <button type="submit" class="save-btn" form="gum-cord-form">Simpan</button>
                </div>
            </div>

            <form id="gum-cord-form" method="POST" action="/cushion-gum-cord" autocomplete="off">
                <input type="hidden" name="tanggal_produksi" id="tanggal_c">
                <div class="table-wrapper">
                    <table class="production-table helper-table">
                        <colgroup>
                            <col>
                            <col>
                            <col>
                            <col>
                            <col>
                            <col>
                            <col>
                            <col>
                            <col>
                            <col>
                            <col>
                        </colgroup>
                        <thead>
                            <tr>
                                <th rowspan="2">Nama Produk</th>
                                <th rowspan="2">Order<br>(Kotak)</th>
                                <th colspan="2">Waktu</th>
                                <th rowspan="2" class="bg-green">Pakai<br>(menit)</th>
                                <th colspan="2">Target (kotak)</th>
                                <th rowspan="2">Aktual<br>(kotak)</th>
                                <th rowspan="2">Persentase<br>(%)</th>
                                <th colspan="2">Berat</th>
                            </tr>
                            <tr>
                                <th>Awal</th>
                                <th>Akhir</th>
                                <th class="bg-orange">Per menit</th>
                                <th class="bg-orange">Total</th>
                                <th>Per kotak</th>
                                <th>Total</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr oninput="hitungPakaiMenitC(this)">
                                <td><input name="nama_produk" value="Gum Cord" readonly></td>
                                <td><input class="order-c" name="order_kotak"></td>
                                <td><input type="time" class="awal-c" name="waktu_awal"></td>
                                <td><input type="time" class="akhir-c" name="waktu_akhir"></td>
                                <td class="bg-green">
                                    <input class="pakai-c" name="pakai_menit" readonly>
                                </td>
                                <td class="bg-pink">
                                    <input class="target-menit-c" name="target_per_menit" value="0.68" readonly>
                                </td>
                                <td class="bg-orange">
                                    <input class="target-total-c" name="target_total" readonly>
                                </td>
                                <td><input class="aktual-c" name="aktual_kotak" oninput="hitungPersentaseC(this)"></td>
                                <td><input class="persentase-c" name="persentase" readonly></td>
                                <td><input class="berat-per-kotak-c" name="berat_per_kotak" readonly></td>
                                <td><input class="berat-total-c" name="berat_total" readonly></td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="gum-cord-mini-table-wrap">
                    <div class="gum-cord-helper-card">
                        <div class="gum-cord-helper-title">Pemakaian Bahan Penolong</div>
                        <div class="gum-cord-helper-grid">
                            <div class="gum-cord-helper-box plastik-box">
                                <div class="gum-cord-helper-box-head">Plastik</div>
                                <div class="gum-cord-helper-box-body">
                                    <input
                                        type="number"
                                        step="0.01"
                                        min="0"
                                        name="plastik_gumcord"
                                        class="gum-cord-helper-input"
                                    >
                                </div>
                            </div>
                            <div class="gum-cord-helper-box kotak-box">
                                <div class="gum-cord-helper-box-head">Kotak</div>
                                <div class="gum-cord-helper-box-body">
                                    <input
                                        type="number"
                                        step="1"
                                        min="0"
                                        name="box_gumcord"
                                        class="gum-cord-helper-input"
                                        readonly
                                        tabindex="-1"
                                    >
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script>
    document.addEventListener("DOMContentLoaded", function () {
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, "0");
        const dd = String(today.getDate()).padStart(2, "0");
        const formatted = `${yyyy}-${mm}-${dd}`;

        const tanggalC = document.getElementById("tanggal_c");
        const tanggalDisplay = document.getElementById("tanggal_display");
        if (tanggalC) {
            tanggalC.value = formatted;
        }
        if (tanggalDisplay) {
            tanggalDisplay.value = formatted;
            tanggalDisplay.addEventListener("change", function () {
                if (tanggalC) {
                    tanggalC.value = tanggalDisplay.value;
                }
                loadGcHelperValues(tanggalDisplay.value);
            });
        }

        const noMesinInput = document.getElementById("no-mesin");
        if (noMesinInput) {
            noMesinInput.addEventListener("focus", function () {
                if (!noMesinInput.value.trim()) {
                    noMesinInput.value = "EXT-0";
                    noMesinInput.setSelectionRange(
                        noMesinInput.value.length,
                        noMesinInput.value.length
                    );
                }
            });
        }

        loadGcHelperValues(formatted);
    });

    async function loadGcHelperValues(tanggalProduksi) {
        if (!tanggalProduksi) return;

        try {
            const res = await fetch(`/gum-cord/helper-values?tanggal=${encodeURIComponent(tanggalProduksi)}`);
            const json = await res.json();
            if (!res.ok || !json.ok) return;

            const plastikInput = document.querySelector("input[name='plastik_gumcord']");
            if (plastikInput) {
                plastikInput.value = json.data?.plastik_gumcord ?? "";
            }
            syncKotakHelperFromAktual();
        } catch (err) {
            console.warn("Gagal memuat helper Gum Cord:", err);
        }
    }

    function syncKotakHelperFromAktual() {
        const aktualInput = document.querySelector(".aktual-c");
        const kotakHelperInput = document.querySelector("input[name='box_gumcord']");
        if (!kotakHelperInput) return;
        kotakHelperInput.value = aktualInput?.value?.trim() || "";
    }

    document.addEventListener("input", function (e) {
        if (e.target.classList.contains("order-c")) {
            const row = e.target.closest("tr");
            const perKotakInput = row?.querySelector(".berat-per-kotak-c");
            const aktualInput = row?.querySelector(".aktual-c");
            if (!perKotakInput) return;

            if (e.target.value.trim() !== "") {
                perKotakInput.value = "10";
            } else {
                perKotakInput.value = "";
            }

            if (aktualInput && aktualInput.value) {
                hitungPersentaseC(aktualInput);
            }
        }

        if (e.target.classList.contains("aktual-c")) {
            syncKotakHelperFromAktual();
        }
    });

    function hitungPakaiMenitC(row) {
        const awal = row.querySelector(".awal-c")?.value;
        const akhir = row.querySelector(".akhir-c")?.value;
        if (!awal || !akhir) return;

        const [ja, ma] = awal.split(":").map(Number);
        const [jb, mb] = akhir.split(":").map(Number);

        const totalAwal = ja * 60 + ma;
        const totalAkhir = jb * 60 + mb;
        const pakai = totalAkhir - totalAwal;
        const pakaiInput = row.querySelector(".pakai-c");
        if (!pakaiInput) return;

        if (pakai < 0) {
            alert("Waktu akhir harus lebih besar");
            pakaiInput.value = "";
            return;
        }

        pakaiInput.value = pakai;

        const targetMenitInput = row.querySelector(".target-menit-c");
        const targetTotalInput = row.querySelector(".target-total-c");
        if (!targetMenitInput || !targetTotalInput) return;

        const targetPerMenit = parseFloat(targetMenitInput.value);
        if (!isNaN(targetPerMenit)) {
            const total = (pakai * targetPerMenit) / 10;
            targetTotalInput.value = total.toFixed(1);
            const aktualInput = row.querySelector(".aktual-c");
            if (aktualInput && aktualInput.value) {
                hitungPersentaseC(aktualInput);
            }
        } else {
            targetTotalInput.value = "";
        }
    }

    function hitungPersentaseC(inputAktual) {
        const row = inputAktual.closest("tr");
        const totalTargetInput = row.querySelector(".target-total-c");
        const persentaseInput = row.querySelector(".persentase-c");
        const perKotakInput = row.querySelector(".berat-per-kotak-c");
        const totalBeratInput = row.querySelector(".berat-total-c");

        const aktual = parseFloat(inputAktual.value);
        const totalTarget = parseFloat(totalTargetInput.value.replace(",", "."));

        if (isNaN(aktual) || isNaN(totalTarget) || totalTarget === 0) {
            persentaseInput.value = "";
            return;
        }

        if (Math.abs(aktual - totalTarget) < 0.01) {
            persentaseInput.value = "100.0";
        } else {
            const persen = (aktual / totalTarget) * 100;
            persentaseInput.value = persen.toFixed(1);
        }

        if (totalBeratInput && perKotakInput) {
            const perKotak = parseFloat(perKotakInput.value);
            if (!isNaN(aktual) && !isNaN(perKotak)) {
                totalBeratInput.value = (aktual * perKotak).toFixed(0);
            } else {
                totalBeratInput.value = "";
            }
        }
    }

    function confirmResetGc() {
        const isConfirmed = confirm("Yakin ingin menghapus semua input form Gum Cord?");
        if (!isConfirmed) return;
        resetFormGc();
    }

    function resetFormGc() {
        const form = document.getElementById("gum-cord-form");
        if (!form) return;

        form.querySelectorAll("input").forEach((input) => {
            const name = input.name || "";
            if (name === "nama_produk" || name === "target_per_menit" || name === "tanggal_produksi") {
                return;
            }
            input.value = "";
        });

        const tanggalDisplay = document.getElementById("tanggal_display");
        const tanggalC = document.getElementById("tanggal_c");
        if (tanggalDisplay && tanggalC) {
            tanggalC.value = tanggalDisplay.value;
        }
        syncKotakHelperFromAktual();
    }
    </script>
</body>
</html>
